# NiuBot 默认配置
# 环境变量优先于此文件：FEISHU_APP_ID, FEISHU_APP_SECRET 等

feishu:
  appId: ""      # 或设置 FEISHU_APP_ID 环境变量
  appSecret: ""  # 或设置 FEISHU_APP_SECRET 环境变量

agent:
  command: "npx -y @zed-industries/claude-agent-acp"
  workingDirectory: "."

database:
  path: "./niubot.db"

queue:
  bufferMs: 3000        # 消息缓冲合并窗口
  cancelThresholdMs: 10000  # cancel+合并阈值
