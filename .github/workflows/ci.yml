name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "22.14.0"
            run-tests: true
          - os: macos-latest
            node: "22.14.0"
            run-tests: true
          - os: windows-latest
            node: "22.14.0"
            run-tests: true
          - os: ubuntu-latest
            node: "18.20.8"
            run-tests: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        if: matrix.run-tests
        run: npm test

      - name: Build and package check
        run: npm run build && npm run pack:check && npm run pack:smoke
